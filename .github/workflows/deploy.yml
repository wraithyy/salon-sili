# Deploy to Cloudflare Pages
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN  — API token with "Cloudflare Pages: Edit" permission
#   CLOUDFLARE_ACCOUNT_ID — account ID from the Cloudflare dashboard
#
# First deploy creates the Pages project "salon-sili" automatically.
# Custom domain (salonsili.cz) is attached in the Cloudflare dashboard:
#   Pages → salon-sili → Custom domains → add salonsili.cz

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v7

      # reads the pinned version from package.json "packageManager"
      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm astro build

      - name: Ensure Pages project exists
        uses: cloudflare/wrangler-action@v4
        continue-on-error: true # fails harmlessly when the project already exists
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages project create salon-sili --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm
          command: pages deploy dist --project-name=salon-sili --branch=main
